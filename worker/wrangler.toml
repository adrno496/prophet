name = "pulse-predict-proxy"
main = "src/index.js"
compatibility_date = "2025-01-01"

# KV namespace pour le rate limit. Remplacer REPLACE_WITH_KV_ID par l'id retourné
# par : `npx wrangler kv namespace create QUOTA`
[[kv_namespaces]]
binding = "QUOTA"
id = "REPLACE_WITH_KV_ID"

[vars]
# Quota par device par jour (UTC). Modifiable sans redéploiement via wrangler.
DAILY_QUOTA = "30"

# Secrets attendus (à set via `npx wrangler secret put`) :
#   GROQ_API_KEY  → ta clé personnelle Groq (https://console.groq.com/keys)

# Observabilité (logs)
[observability]
enabled = true
